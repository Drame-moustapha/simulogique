<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulogique - Afficheur 7 Segments Série</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- AFFICHEUR -->
    <div class="display-box">
        <div class="display">
            <div id="fa" class="segment a"></div>
            <div id="fb" class="segment b"></div>
            <div id="fc" class="segment c"></div>
            <div id="fd" class="segment d"></div>
            <div id="fe" class="segment e"></div>
            <div id="ff" class="segment f"></div>
            <div id="fg" class="segment g"></div>
            <div id="fh" class="dot"></div>
        </div>
    </div>

    <!-- CONTROLE -->
    <div class="keypad">
        <button id="power">0</button>
    </div>

</div>

<script src="app-serie.js"></script>
</body>
</html>
