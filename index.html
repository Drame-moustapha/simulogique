<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulogique - Navbar centrée</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding-top: 60px; /* espace pour navbar fixe */
        }

        /* Navbar fixe centrée */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            display: flex;
            justify-content: center; /* centre horizontalement les boutons */
            align-items: center;
            padding: 10px 20px;
            z-index: 1000;
            flex-wrap: wrap; /* permet aux boutons de passer à la ligne si petit écran */
        }

        .navbar button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px; /* espace entre boutons */
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .navbar button:hover {
            background-color: #555;
        }

        .navbar button.active {
            background-color: #007BFF;
        }

        /* Responsive pour petit écran */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
            }

            .navbar button {
                width: 90%;
                margin: 5px auto;
            }
        }

        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="content">
    <h1>Bienvenue sur Simulogique</h1>
    <p>La navbar est désormais centrée horizontalement et reste fixe en haut.</p>
</div>

<script>
    // Charger navbar depuis navbar.html
    fetch('./navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar-container').innerHTML = data;

            const buttons = document.querySelectorAll('.navbar button');
            buttons.forEach(button => {
                if (window.location.pathname.endsWith(button.dataset.page)) {
                    button.classList.add('active');
                }
                button.addEventListener('click', () => {
                    window.location.href = button.dataset.page;
                });
            });
        })
        .catch(err => console.error('Erreur de chargement de la navbar :', err));
</script>

</body>
</html>
