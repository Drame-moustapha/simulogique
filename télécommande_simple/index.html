<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulogique - Télécommande pédagogique</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="remote">

    <!-- Écran -->
    <div class="screen">
        <div id="power-state">OFF</div>
        <div>Canal : <span id="channel">--</span></div>
        <div>Volume : <span id="volume">--</span></div>
        <div id="mute-indicator"></div>
        <div id="battery">🔋100%</div>
    </div>

    <!-- Contrôles principaux -->
    <div class="controls">
        <button id="power">ON/OFF</button>
        <button id="ch-up">CH +</button>
        <button id="ch-down">CH −</button>
        <button id="vol-up">VOL +</button>
        <button id="vol-down">VOL −</button>
        <button id="mute">MUTE</button>
    </div>

    <!-- Clavier numérique pour sélection directe de canal -->
    <div class="num-pad">
        <button class="num" data-val="1">1</button>
        <button class="num" data-val="2">2</button>
        <button class="num" data-val="3">3</button>
        <button class="num" data-val="4">4</button>
        <button class="num" data-val="5">5</button>
        <button class="num" data-val="6">6</button>
        <button class="num" data-val="7">7</button>
        <button class="num" data-val="8">8</button>
        <button class="num" data-val="9">9</button>
        <button class="num" data-val="0">0</button>
        <button id="ok">OK</button>
    </div>

    <!-- Chaînes favorites -->
    <div class="favorites">
        <button class="fav" data-val="1">Fav 1</button>
        <button class="fav" data-val="5">Fav 5</button>
        <button class="fav" data-val="10">Fav 10</button>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
